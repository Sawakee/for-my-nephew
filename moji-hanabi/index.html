<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>もじはなび 🎆</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #050510;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  user-select: none;
}
canvas { display: block; width: 100vw; height: 100vh; }
#ui {
  position: fixed; top: 1.2rem; left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
  pointer-events: none;
}
#title {
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 900;
  letter-spacing: 0.04em;
  animation: rainbowGlow 2s linear infinite;
  text-shadow: 0 0 30px currentColor;
}
@keyframes rainbowGlow {
  0%   { color: #ff6b6b; }
  16%  { color: #ffd93d; }
  33%  { color: #6bcb77; }
  50%  { color: #74c0fc; }
  66%  { color: #c77dff; }
  83%  { color: #ff79c6; }
  100% { color: #ff6b6b; }
}
#hint {
  color: rgba(255,255,255,0.55);
  font-size: clamp(0.75rem, 2.5vw, 0.95rem);
  background: rgba(255,255,255,0.07);
  padding: 0.3rem 1rem;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  text-align: center;
}
#back-btn {
  position: fixed; top: 1rem; left: 1rem;
  background: rgba(255,255,255,0.12);
  color: white; border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px; padding: 0.4rem 0.9rem;
  cursor: pointer; font-size: 0.9rem;
  pointer-events: all; text-decoration: none;
  transition: background 0.2s;
  backdrop-filter: blur(8px);
}
#back-btn:hover { background: rgba(255,255,255,0.22); }
#count {
  position: fixed; bottom: 1rem; right: 1rem;
  color: rgba(255,255,255,0.3);
  font-size: 0.75rem; font-family: monospace;
  pointer-events: none;
}
#keys-hint {
  position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.2); font-size: 0.75rem;
  pointer-events: none; white-space: nowrap;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="title">🎆 もじはなび</div>
  <div id="hint">キーをおして はなびをあげよう！ &nbsp;Space=★ &nbsp;Enter=❤ &nbsp;BackSpace=ぜんけし</div>
</div>
<a href="../" id="back-btn">← もどる</a>
<div id="count"></div>
<div id="keys-hint">なんでもキーをおしてみて！</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const countEl = document.getElementById('count');

const COLORS = [
  '#FF4466','#FF7744','#FFDD00','#AAFF44',
  '#44FFCC','#44AAFF','#BB44FF','#FF44CC',
  '#FFFFFF','#FFD700','#FF6BCD','#00FFC8'
];
const MAX_P = 700;
const FPS = 30;
const INTERVAL = 1000 / FPS;

let particles = [];
let colorIdx = 0;
let lastTime = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(x, y, text, vx, vy, color, size) {
    this.x = x; this.y = y;
    this.text = text;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.age = 0;
    this.life = 70 + Math.random() * 100;
    this.fontSize = size || (16 + Math.random() * 14);
    this.rot = Math.random() * Math.PI * 2;
    this.vrot = (Math.random() - 0.5) * 0.15;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.11;
    this.vx *= 0.995;
    this.rot += this.vrot;
    this.age++;
    if (this.x < 8)  { this.x = 8;  this.vx =  Math.abs(this.vx) * 0.75; spawnSparks(this.x, this.y); }
    if (this.x > canvas.width  - 8) { this.x = canvas.width  - 8; this.vx = -Math.abs(this.vx) * 0.75; spawnSparks(this.x, this.y); }
    if (this.y > canvas.height - 8) {
      this.y = canvas.height - 8;
      this.vy = -Math.abs(this.vy) * 0.72;
      if (Math.abs(this.vy) < 0.6) this.vy = 0;
      spawnSparks(this.x, this.y);
    }
    return this.age < this.life;
  }
  draw() {
    const alpha = Math.max(0, 1 - this.age / this.life);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.font = `bold ${this.fontSize}px 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif`;
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 18;
    ctx.fillText(this.text, 0, 0);
    ctx.restore();
  }
}

function spawnSparks(x, y) {
  const n = 3 + Math.floor(Math.random() * 4);
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.8 + Math.random() * 2.5;
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    addParticle(new Particle(x, y, '✦', Math.cos(angle)*speed, Math.sin(angle)*speed, color, 8 + Math.random()*8));
  }
}

function addParticle(p) {
  if (particles.length < MAX_P) particles.push(p);
  else { particles.shift(); particles.push(p); }
}

function spawnBurst(text, count, cx, cy) {
  const x = cx ?? canvas.width  * (0.15 + Math.random() * 0.7);
  const y = cy ?? canvas.height * (0.15 + Math.random() * 0.45);
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.4;
    const speed = 3 + Math.random() * 6;
    const color = COLORS[(colorIdx + i) % COLORS.length];
    addParticle(new Particle(x, y, text, Math.cos(angle)*speed, Math.sin(angle)*speed, color));
  }
  colorIdx++;
}

function spawnChar(ch) {
  const cx = canvas.width  * (0.15 + Math.random() * 0.7);
  const cy = canvas.height * (0.3  + Math.random() * 0.35);
  const color = COLORS[colorIdx % COLORS.length];
  colorIdx++;
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.0;
  const speed = 5 + Math.random() * 7;
  addParticle(new Particle(cx, cy, ch, Math.cos(angle)*speed, Math.sin(angle)*speed, color, 22 + Math.random() * 16));
  for (let i = 0; i < 5; i++) {
    const a2 = angle + (Math.random()-0.5)*2;
    const s2 = 2 + Math.random() * 6;
    const c2 = COLORS[(colorIdx + i) % COLORS.length];
    addParticle(new Particle(cx + (Math.random()-0.5)*40, cy + (Math.random()-0.5)*30, ch, Math.cos(a2)*s2, Math.sin(a2)*s2, c2, 14 + Math.random()*12));
  }
}

document.addEventListener('keydown', (e) => {
  e.preventDefault();
  if (e.key === ' ') {
    spawnBurst('★', 8);
    spawnBurst('✦', 6);
  } else if (e.key === 'Enter') {
    spawnBurst('❤', 12);
    spawnChar('❤');
  } else if (e.key === 'Backspace') {
    particles = [];
  } else if (e.key.length === 1) {
    spawnChar(e.key);
  }
});

// Auto-attract: idle sparks when nothing is happening
let idleTimer = 0;
setInterval(() => {
  if (particles.length < 80) {
    const chars = ['★','❤','✦','✿','♪','◆','☆','♠'];
    spawnBurst(chars[Math.floor(Math.random() * chars.length)], 6 + Math.floor(Math.random()*6));
  }
}, 2500);

function loop(now) {
  requestAnimationFrame(loop);
  if (now - lastTime < INTERVAL) return;
  lastTime = now;

  // Dark fade trail
  ctx.fillStyle = 'rgba(5, 5, 16, 0.22)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles = particles.filter(p => {
    const alive = p.update();
    if (alive) p.draw();
    return alive;
  });

  countEl.textContent = `${particles.length} / ${MAX_P}`;
}
requestAnimationFrame(loop);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>もじはなび 🎆</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a1a;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #ui {
    position: fixed;
    top: 1rem;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    pointer-events: none;
  }
  #title {
    color: white;
    font-size: 1.8rem;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(255,200,100,0.8);
  }
  #hint {
    color: rgba(255,255,255,0.6);
    font-size: 0.9rem;
  }
  #back-btn {
    position: fixed;
    top: 1rem;
    left: 1rem;
    background: rgba(255,255,255,0.15);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    font-size: 0.9rem;
    pointer-events: all;
    text-decoration: none;
  }
  #back-btn:hover { background: rgba(255,255,255,0.25); }
  #count {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    color: rgba(255,255,255,0.4);
    font-size: 0.8rem;
    font-family: monospace;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="title">🎆 もじはなび</div>
  <div id="hint">キーをおして はなびをあげよう！ Space=★ Enter=❤ BackSpace=ぜんけし</div>
</div>
<a href="../" id="back-btn">← もどる</a>
<div id="count"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const countEl = document.getElementById('count');

const COLORS = [
  '#FF4444', '#FF7744', '#FFCC00', '#AAFFAA',
  '#44FFFF', '#4499FF', '#AA44FF', '#FF44CC',
  '#FFFFFF', '#FFD700'
];
const MAX_P = 600;
const FPS = 30;
const INTERVAL = 1000 / FPS;

let particles = [];
let colorIdx = 0;
let lastTime = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(x, y, text, vx, vy, color) {
    this.x = x;
    this.y = y;
    this.text = text;
    this.vx = vx;
    this.vy = vy;
    this.color = color;
    this.age = 0;
    this.life = 60 + Math.random() * 90;
    this.fontSize = 14 + Math.random() * 10;
    this.bounced = false;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.12; // gravity
    this.age++;

    // Wall bounce
    if (this.x < 10) { this.x = 10; this.vx = Math.abs(this.vx) * 0.82; spawnSparks(this.x, this.y); }
    if (this.x > canvas.width - 10) { this.x = canvas.width - 10; this.vx = -Math.abs(this.vx) * 0.82; spawnSparks(this.x, this.y); }
    if (this.y > canvas.height - 10) {
      this.y = canvas.height - 10;
      this.vy = -Math.abs(this.vy) * 0.82;
      if (Math.abs(this.vy) < 0.5) this.vy = 0;
      spawnSparks(this.x, this.y);
    }
    return this.age < this.life;
  }
  draw() {
    const alpha = Math.max(0, 1 - this.age / this.life);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${this.fontSize}px 'Segoe UI Emoji', sans-serif`;
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 8;
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }
}

function spawnSparks(x, y) {
  if (particles.length >= MAX_P) return;
  const n = 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    addParticle(new Particle(x, y, '·', Math.cos(angle)*speed, Math.sin(angle)*speed, color));
  }
}

function addParticle(p) {
  if (particles.length < MAX_P) {
    particles.push(p);
  } else {
    // Replace oldest
    particles.shift();
    particles.push(p);
  }
}

function spawnBurst(text, count) {
  const cx = canvas.width * (0.2 + Math.random() * 0.6);
  const cy = canvas.height * (0.2 + Math.random() * 0.4);
  const color = COLORS[colorIdx % COLORS.length];
  colorIdx++;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
    const speed = 2 + Math.random() * 5;
    addParticle(new Particle(cx, cy, text, Math.cos(angle)*speed, Math.sin(angle)*speed, color));
  }
}

function spawnChar(ch) {
  const cx = canvas.width * (0.2 + Math.random() * 0.6);
  const cy = canvas.height * (0.3 + Math.random() * 0.3);
  const color = COLORS[colorIdx % COLORS.length];
  colorIdx++;
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
  const speed = 4 + Math.random() * 6;
  addParticle(new Particle(cx, cy, ch, Math.cos(angle)*speed, Math.sin(angle)*speed, color));
  // Extra copies
  for (let i = 0; i < 3; i++) {
    const a2 = angle + (Math.random()-0.5) * 1.5;
    const s2 = 2 + Math.random() * 5;
    const c2 = COLORS[(colorIdx + i) % COLORS.length];
    addParticle(new Particle(cx + (Math.random()-0.5)*30, cy + (Math.random()-0.5)*30, ch, Math.cos(a2)*s2, Math.sin(a2)*s2, c2));
  }
}

document.addEventListener('keydown', (e) => {
  e.preventDefault();
  if (e.key === ' ') {
    spawnBurst('★', 3);
  } else if (e.key === 'Enter') {
    spawnBurst('❤', 1);
    spawnChar('❤');
  } else if (e.key === 'Backspace') {
    particles = [];
  } else if (e.key.length === 1) {
    spawnChar(e.key);
  }
});

let animId;
function loop(now) {
  animId = requestAnimationFrame(loop);
  if (now - lastTime < INTERVAL) return;
  lastTime = now;

  // Fade trail
  ctx.fillStyle = 'rgba(10, 10, 26, 0.25)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles = particles.filter(p => {
    const alive = p.update();
    if (alive) p.draw();
    return alive;
  });

  countEl.textContent = `${particles.length} / ${MAX_P}`;
}
requestAnimationFrame(loop);
</script>
</body>
</html>

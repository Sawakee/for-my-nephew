<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きおくあわせ 🃏</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
  user-select: none; padding: 1rem;
  background: linear-gradient(-45deg, #0f3460, #16213e, #1a1a2e, #0f3460, #533483, #e94560);
  background-size: 400% 400%;
  animation: bgAnim 10s ease infinite;
  position: relative; overflow: hidden;
}
@keyframes bgAnim {
  0%,100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}
.star-bg {
  position: fixed; pointer-events: none;
  font-size: 1.2rem; opacity: 0.12;
  animation: twinkle 3s ease-in-out infinite alternate;
}
@keyframes twinkle {
  from { opacity: 0.05; transform: scale(0.8); }
  to   { opacity: 0.2; transform: scale(1.2); }
}
h1 {
  position: relative; z-index: 1;
  font-size: clamp(1.8rem, 6vw, 3rem);
  font-weight: 900; margin-bottom: 0.5rem;
  animation: rainbowText 3s linear infinite;
  text-shadow: 0 0 20px currentColor, 0 4px 8px rgba(0,0,0,0.3);
  letter-spacing: 0.03em;
}
@keyframes rainbowText {
  0%   { color: #ff6b6b; }
  16%  { color: #ffd93d; }
  33%  { color: #6bcb77; }
  50%  { color: #74c0fc; }
  66%  { color: #c77dff; }
  83%  { color: #ff79c6; }
  100% { color: #ff6b6b; }
}
#stats {
  position: relative; z-index: 1;
  display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; justify-content: center;
}
.stat-pill {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 30px; padding: 0.35rem 1.1rem;
  color: white; font-size: 1rem; font-weight: 700;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}
#board {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 0.8rem; margin-bottom: 1.5rem;
}
.card-wrap {
  width: clamp(65px, 17vw, 95px);
  height: clamp(85px, 21vw, 120px);
  cursor: pointer;
}
.card-inner {
  width: 100%; height: 100%;
  position: relative; transform-style: preserve-3d;
  transition: transform 0.4s ease;
  transform-origin: 50% 50%;
  will-change: transform;
}
/* perspective() in the transform itself so each card rotates around
   its own center, regardless of where it sits in the grid */
.card-wrap.face-up .card-inner { transform: perspective(600px) rotateY(180deg); }
.card-front, .card-back {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  backface-visibility: hidden; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
}
.card-back {
  background: linear-gradient(145deg, #6c3483, #1a5276, #117a65);
  box-shadow: 0 6px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
  font-size: clamp(1.5rem, 5vw, 2.2rem);
  border: 3px solid rgba(255,255,255,0.2);
  overflow: hidden;
}
.card-back::after {
  content: '✦ ✦ ✦\n✦ 🌟 ✦\n✦ ✦ ✦';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; color: rgba(255,255,255,0.15);
  white-space: pre; text-align: center; line-height: 1.8;
  pointer-events: none;
}
.card-front {
  background: white;
  transform: rotateY(180deg);
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  font-size: clamp(2.2rem, 9vw, 4rem);
  border: 3px solid rgba(255,255,255,0.8);
}
.card-wrap.matched .card-inner {
  animation: matchBounce 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.card-wrap.matched .card-front {
  background: linear-gradient(135deg, #d4fc79, #96e6a1);
  box-shadow: 0 0 20px rgba(100,255,150,0.6), 0 6px 20px rgba(0,0,0,0.2);
  border-color: #6bcb77;
}
@keyframes matchBounce {
  0%   { transform: perspective(600px) rotateY(180deg) scale(1); }
  35%  { transform: perspective(600px) rotateY(180deg) scale(1.25); }
  100% { transform: perspective(600px) rotateY(180deg) scale(1); }
}
.card-wrap.shake .card-inner {
  animation: shakeFail 0.4s ease;
}
@keyframes shakeFail {
  0%,100% { transform: perspective(600px) rotateY(180deg) translateX(0); }
  20%,60% { transform: perspective(600px) rotateY(180deg) translateX(-8px); }
  40%,80% { transform: perspective(600px) rotateY(180deg) translateX(8px); }
}
.card-wrap.cursor .card-back,
.card-wrap.cursor .card-front {
  box-shadow: 0 0 20px rgba(255,215,0,0.6), 0 6px 20px rgba(0,0,0,0.2);
}
#message {
  position: relative; z-index: 1;
  font-size: clamp(1.2rem, 4vw, 1.8rem);
  font-weight: 900; min-height: 2.5rem;
  text-align: center;
  animation: rainbowText 2s linear infinite;
  text-shadow: 0 0 20px currentColor, 0 3px 6px rgba(0,0,0,0.3);
}
#restart-btn {
  position: relative; z-index: 1;
  margin-top: 0.8rem; padding: 0.7rem 2rem;
  font-size: 1.1rem; border: none; border-radius: 30px;
  background: linear-gradient(135deg, #ffd93d, #ff6b6b);
  color: white; font-weight: 900; cursor: pointer;
  box-shadow: 0 6px 20px rgba(255,100,100,0.4);
  display: none; transition: transform 0.2s;
  text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}
#restart-btn:hover { transform: scale(1.08); }
#controls {
  position: relative; z-index: 1;
  color: rgba(255,255,255,0.5);
  font-size: 0.85rem; text-align: center; line-height: 2;
  margin-top: 0.5rem;
}
.keyboard-hint { display: inline; }
.touch-hint    { display: none; }
@media (pointer: coarse) {
  .keyboard-hint { display: none; }
  .touch-hint    { display: inline; }
  #board { gap: 0.6rem; }
}
#back-btn {
  position: fixed; top: 1rem; left: 1rem; z-index: 10;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  color: white; border: 1px solid rgba(255,255,255,0.3);
  border-radius: 10px; padding: 0.4rem 0.9rem;
  cursor: pointer; font-size: 0.9rem; text-decoration: none;
  transition: background 0.2s;
}
#back-btn:hover { background: rgba(255,255,255,0.28); }
#confetti-layer {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 100;
  display: none;
}
</style>
</head>
<body>
<a href="../" id="back-btn">← もどる</a>
<h1>🃏 きおくあわせ</h1>
<div id="stats">
  <div class="stat-pill">てすう: <span id="moves">0</span></div>
  <div class="stat-pill">みつけた: <span id="pairs">0</span> / 4</div>
</div>
<div id="board"></div>
<div id="message"></div>
<button id="restart-btn" onclick="init()">もう一度あそぶ 🔄</button>
<div id="controls">
  <span class="keyboard-hint">← → ↑ ↓ カーソル移動 &nbsp;|&nbsp; Enter / Space でめくる<br></span>
  <span class="touch-hint">カードをタップしてめくろう！<br></span>
  おなじどうぶつをさがしてね 🐾
</div>
<canvas id="confetti-layer"></canvas>

<script>
// Background stars
const STARS = ['✦','✧','⭐','🌟','💫'];
for (let i = 0; i < 25; i++) {
  const s = document.createElement('span');
  s.className = 'star-bg';
  s.textContent = STARS[Math.floor(Math.random()*STARS.length)];
  s.style.left = Math.random()*100 + 'vw';
  s.style.top  = Math.random()*100 + 'vh';
  s.style.animationDelay = (Math.random()*3) + 's';
  s.style.animationDuration = (2+Math.random()*3) + 's';
  s.style.fontSize = (0.8+Math.random()*1.5) + 'rem';
  document.body.appendChild(s);
}

const EMOJIS = ['🐶','🐱','🐭','🐹'];
let cards, matched, faceUp, flipped, moves, pairsFound, cursor;
let locked = false;

function init() {
  const deck = [...EMOJIS, ...EMOJIS];
  for (let i = deck.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  cards = deck;
  matched = Array(8).fill(false);
  faceUp  = Array(8).fill(false);
  flipped = []; moves = 0; pairsFound = 0; cursor = 0; locked = false;
  document.getElementById('moves').textContent = '0';
  document.getElementById('pairs').textContent = '0';
  document.getElementById('message').textContent = '';
  document.getElementById('restart-btn').style.display = 'none';
  document.getElementById('board').innerHTML = ''; // force full rebuild on new game
  render();
}

function cardClass(i, shakeIdxs) {
  return 'card-wrap' +
    (faceUp[i] || matched[i] ? ' face-up' : '') +
    (matched[i] ? ' matched' : '') +
    (i === cursor ? ' cursor' : '') +
    (shakeIdxs && shakeIdxs.includes(i) ? ' shake' : '');
}

function render(shakeIdxs) {
  const board = document.getElementById('board');
  const existing = board.querySelectorAll('.card-wrap');
  if (existing.length === 8) {
    // Update classes in-place — no DOM destruction, no layout shift
    existing.forEach((w, i) => { w.className = cardClass(i, shakeIdxs); });
  } else {
    // Initial build (called once per game from init)
    board.innerHTML = '';
    cards.forEach((emoji, i) => {
      const wrap = document.createElement('div');
      wrap.className = cardClass(i, shakeIdxs);
      wrap.innerHTML = `
        <div class="card-inner">
          <div class="card-back">🌟</div>
          <div class="card-front">${emoji}</div>
        </div>`;
      wrap.addEventListener('click', () => flipCard(i));
      board.appendChild(wrap);
    });
  }
}

function flipCard(i) {
  if (locked) return;
  if (matched[i] || faceUp[i]) return;
  if (flipped.length >= 2) return;

  faceUp[i] = true;
  flipped.push(i);
  render();

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;

    if (cards[flipped[0]] === cards[flipped[1]]) {
      matched[flipped[0]] = true;
      matched[flipped[1]] = true;
      pairsFound++;
      document.getElementById('pairs').textContent = pairsFound;
      flipped = [];
      render();
      if (pairsFound === 4) {
        document.getElementById('message').textContent = `🎉 クリア！ ${moves}てでできたよ！ 🎉`;
        document.getElementById('restart-btn').style.display = 'inline-block';
        launchConfetti();
      }
    } else {
      locked = true;
      const bad = [...flipped];
      setTimeout(() => {
        render(bad); // add shake class
        setTimeout(() => {
          faceUp[bad[0]] = false;
          faceUp[bad[1]] = false;
          flipped = []; locked = false;
          render();
        }, 400);
      }, 900);
    }
  }
}

document.addEventListener('keydown', (e) => {
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' ','Enter'].includes(e.key)) e.preventDefault();
  if (e.key === 'ArrowRight') { cursor = (cursor+1)%8; render(); }
  else if (e.key === 'ArrowLeft') { cursor = (cursor+7)%8; render(); }
  else if (e.key === 'ArrowDown') { cursor = (cursor+4)%8; render(); }
  else if (e.key === 'ArrowUp')   { cursor = (cursor+4)%8; render(); }
  else if (e.key === 'Enter' || e.key === ' ') { flipCard(cursor); }
});

function launchConfetti() {
  const cv = document.getElementById('confetti-layer');
  cv.style.display = 'block';
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  const SHAPES = ['rect','circle','star'];
  const ps = Array.from({length: 120}, () => ({
    x: Math.random()*cv.width, y: -20,
    vx: (Math.random()-0.5)*7, vy: 2+Math.random()*6,
    r: 6+Math.random()*10, rot: Math.random()*Math.PI*2,
    vrot: (Math.random()-0.5)*0.18,
    color: `hsl(${Math.random()*360},90%,60%)`,
    shape: SHAPES[Math.floor(Math.random()*3)]
  }));
  function draw() {
    ctx.clearRect(0,0,cv.width,cv.height);
    let alive = false;
    ps.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.rot+=p.vrot;
      if (p.y < cv.height+30) { alive = true; }
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.r/2,-p.r/3,p.r,p.r*0.6);
      } else if (p.shape === 'circle') {
        ctx.beginPath(); ctx.arc(0,0,p.r/2,0,Math.PI*2); ctx.fill();
      } else {
        ctx.beginPath();
        for (let j=0;j<5;j++) {
          const a = (j*4*Math.PI/5)-Math.PI/2;
          const b = (j*4*Math.PI/5+2*Math.PI/5)-Math.PI/2;
          j===0?ctx.moveTo(Math.cos(a)*p.r,Math.sin(a)*p.r):ctx.lineTo(Math.cos(a)*p.r,Math.sin(a)*p.r);
          ctx.lineTo(Math.cos(b)*p.r*0.4,Math.sin(b)*p.r*0.4);
        }
        ctx.closePath(); ctx.fill();
      }
      ctx.restore();
    });
    if (alive) requestAnimationFrame(draw);
    else { cv.style.display='none'; }
  }
  draw();
}

init();
</script>
</body>
</html>
